##
## CondoHome - Portal Web (Admin)
## Kubernetes Deployment + Service + Ingress
##

apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: condohome
  labels:
    app: portal-web
    tier: frontend
    part-of: condohome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-web
  template:
    metadata:
      labels:
        app: portal-web
        tier: frontend
    spec:
      containers:
        - name: portal-web
          image: ghcr.io/rmaneschy/portal-condohome-web:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portal-web
  namespace: condohome
  labels:
    app: portal-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: portal-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-web-ingress
  namespace: condohome
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - condohome.com.br
      secretName: portal-web-tls
  rules:
    - host: condohome.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-web
                port:
                  number: 80
