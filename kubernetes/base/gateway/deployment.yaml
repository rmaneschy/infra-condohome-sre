---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: condohome
  labels:
    app: gateway
    tier: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: edge
    spec:
      containers:
        - name: gateway
          image: ghcr.io/rmaneschy/ms-condohome-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: REGISTER_SERVICE_URL
              value: http://register:8081
            - name: BILLING_SERVICE_URL
              value: http://billing:8082
            - name: DOCUMENTS_SERVICE_URL
              value: http://documents:8083
            - name: AI_ASSISTANT_SERVICE_URL
              value: http://ai-assistant:8085
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification:8086
            - name: BOOKING_SERVICE_URL
              value: http://booking:8087
            - name: FINANCE_SERVICE_URL
              value: http://finance:8088
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: condohome
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: condohome-ingress
  namespace: condohome
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.condohome.com.br
      secretName: condohome-tls
  rules:
    - host: api.condohome.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
