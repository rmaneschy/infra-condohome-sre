##
## CondoHome - Assistente Portaria
## Python 3.11 + n8n + WhatsApp + PostgreSQL + IA/LLM
## Kubernetes Deployment + Service + Ingress
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistente-portaria
  namespace: condohome
  labels:
    app: assistente-portaria
    tier: backend
    part-of: condohome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assistente-portaria
  template:
    metadata:
      labels:
        app: assistente-portaria
        tier: backend
    spec:
      containers:
        - name: assistente-portaria
          image: ghcr.io/rmaneschy/assistente-portaria:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: condohome-secrets
                  key: portaria-database-url
            - name: REDIS_URL
              value: "redis://redis:6379/2"
            - name: API_GATEWAY_URL
              value: "http://kong:8000"
            - name: N8N_WEBHOOK_URL
              value: "http://n8n:5678"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: condohome-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: assistente-portaria
  namespace: condohome
  labels:
    app: assistente-portaria
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: assistente-portaria
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assistente-portaria-ingress
  namespace: condohome
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - portaria.condohome.com.br
      secretName: portaria-tls
  rules:
    - host: portaria.condohome.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: assistente-portaria
                port:
                  number: 80
