---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: condohome
  labels:
    app: notification
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        tier: backend
    spec:
      containers:
        - name: notification
          image: ghcr.io/rmaneschy/ms-condohome-notification:latest
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/condohome_notification
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: condohome-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: condohome-db-secret
                  key: password
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: condohome-api-secrets
                  key: mail-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: condohome-api-secrets
                  key: mail-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8086
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: condohome
spec:
  selector:
    app: notification
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
