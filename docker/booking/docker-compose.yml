##
## CondoHome - Booking Domain
## Reservas de espaços, regras, conflitos de agenda
##

version: '3.8'

services:
  booking:
    image: ghcr.io/rmaneschy/ms-condohome-booking:${TAG:-latest}
    container_name: condohome-booking
    build:
      context: ${BOOKING_BUILD_CONTEXT:-../../../ms-condohome-booking}
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/condohome_booking
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-condohome}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-condohome123}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SERVER_PORT: 8087
    ports:
      - "${BOOKING_PORT:-8087}:8087"
    networks:
      - condohome-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  condohome-net:
    external: true
    name: condohome-net
