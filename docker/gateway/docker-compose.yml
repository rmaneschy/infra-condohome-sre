##
## CondoHome - API Gateway
## Roteamento, Rate Limiting, Circuit Breaker, CORS
##

version: '3.8'

services:
  gateway:
    image: ghcr.io/rmaneschy/ms-condohome-gateway:${TAG:-latest}
    container_name: condohome-gateway
    build:
      context: ${GATEWAY_BUILD_CONTEXT:-../../../ms-condohome-gateway}
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      REGISTER_SERVICE_URL: http://condohome-register:8081
      BILLING_SERVICE_URL: http://condohome-billing:8082
      DOCUMENTS_SERVICE_URL: http://condohome-documents:8083
      AI_ASSISTANT_SERVICE_URL: http://condohome-ai-assistant:8085
      NOTIFICATION_SERVICE_URL: http://condohome-notification:8086
      BOOKING_SERVICE_URL: http://condohome-booking:8087
      FINANCE_SERVICE_URL: http://condohome-finance:8088
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SERVER_PORT: 8080
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - condohome-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

networks:
  condohome-net:
    external: true
    name: condohome-net
