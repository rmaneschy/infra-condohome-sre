##
## CondoHome - Kong API Gateway (Standalone)
##
## Uso STANDALONE (quando nao usar o compose principal):
##   docker compose -f docker/kong/docker-compose.yml up -d
##
## RECOMENDADO: Usar o compose principal para integrar com os microservicos:
##   docker compose --profile backend up -d
##   (ou: make kong-start / make backend / make full)
##
## Este compose e util para:
##   - Testar Kong isoladamente
##   - Desenvolvimento do Kong sem subir microservicos
##   - CI/CD pipelines que precisam apenas do Kong
##
services:
  # =====================================================
  # Kong Database (PostgreSQL dedicado)
  # =====================================================
  kong-database:
    image: postgres:16-alpine
    container_name: condohome-kong-database
    environment:
      POSTGRES_USER: ${KONG_PG_USER:-kong}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:-kong123}
      POSTGRES_DB: ${KONG_PG_DATABASE:-kong}
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    ports:
      - "${KONG_PG_PORT:-5433}:5432"
    networks:
      - condohome-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KONG_PG_USER:-kong} -d ${KONG_PG_DATABASE:-kong}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =====================================================
  # Kong Migrations (executa uma vez e sai)
  # =====================================================
  kong-migrations:
    image: kong:${KONG_VERSION:-3.9}
    container_name: condohome-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong123}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
    networks:
      - condohome-net
    depends_on:
      kong-database:
        condition: service_healthy
    restart: on-failure

  # =====================================================
  # Kong Gateway
  # =====================================================
  kong:
    image: kong:${KONG_VERSION:-3.9}
    container_name: condohome-kong
    environment:
      # Database
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong123}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      # Proxy
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      # Plugins
      KONG_PLUGINS: bundled
      # DNS - resolve Docker service names
      KONG_DNS_RESOLVER: 127.0.0.11:53
      # Logging
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL:-info}
      # Trusted IPs (for X-Forwarded-*)
      KONG_TRUSTED_IPS: 0.0.0.0/0,::/0
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"       # Proxy HTTP
      - "${KONG_PROXY_SSL_PORT:-8443}:8443"   # Proxy HTTPS
      - "${KONG_ADMIN_PORT:-8001}:8001"       # Admin API HTTP
      - "${KONG_ADMIN_SSL_PORT:-8444}:8444"   # Admin API HTTPS
      - "${KONG_ADMIN_GUI_PORT:-8002}:8002"   # Kong Manager GUI
    networks:
      - condohome-net
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  kong_postgres_data:

networks:
  condohome-net:
    external: true
    name: condohome-net
