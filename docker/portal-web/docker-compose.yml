##
## CondoHome - Portal Web (Admin)
## Vite + React 19 + TypeScript + Tailwind + Shadcn UI
## Porta: 3000
##

services:
  portal-web:
    image: ghcr.io/rmaneschy/portal-condohome-web:${TAG:-latest}
    container_name: condohome-portal-web
    build:
      context: ${PORTAL_WEB_BUILD_CONTEXT:-../../../portal-condohome-web}
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${PORTAL_WEB_PORT:-3000}:80"
    networks:
      - condohome-net
    depends_on:
      - kong
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  condohome-net:
    external: true
    name: condohome-net
