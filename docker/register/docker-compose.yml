##
## CondoHome - Register Domain
## Cadastro de condomínios, blocos, unidades, pessoas, veículos
##

version: '3.8'

services:
  register:
    image: ghcr.io/rmaneschy/ms-condohome-register:${TAG:-latest}
    container_name: condohome-register
    build:
      context: ${REGISTER_BUILD_CONTEXT:-../../../ms-condohome-register}
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/condohome_register
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-condohome}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-condohome123}
      SERVER_PORT: 8081
    ports:
      - "${REGISTER_PORT:-8081}:8081"
    networks:
      - condohome-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  condohome-net:
    external: true
    name: condohome-net
