# =====================================================
# Global Plugins
# =====================================================
plugins:
  # --- CORS ---
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:5173
        - https://condohome.com.br
        - https://www.condohome.com.br
        - https://portaria.condohome.com.br
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-Requested-With
        - X-Condominium-Id
        - X-Unit-Id
      exposed_headers:
        - X-Auth-Token
        - X-Total-Count
        - X-Page-Number
        - X-Page-Size
      credentials: true
      max_age: 3600
      preflight_continue: false

  # --- Rate Limiting (global) ---
  - name: rate-limiting
    config:
      minute: 120
      hour: 3600
      policy: local
      fault_tolerant: true
      hide_client_headers: false
      error_code: 429
      error_message: "Limite de requisicoes excedido. Tente novamente mais tarde."

  # --- Request Size Limiting ---
  - name: request-size-limiting
    config:
      allowed_payload_size: 50
      size_unit: megabytes
      require_content_length: false

  # --- Correlation ID ---
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  # --- Prometheus Metrics ---
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

# =====================================================
# Consumers (para autenticação futura)
# =====================================================
consumers:
  - username: portal-web
    custom_id: portal-web-client
    keyauth_credentials:
      - key: ${KONG_PORTAL_API_KEY:-condohome-portal-key}

  - username: portaria-app
    custom_id: portaria-app-client
    keyauth_credentials:
      - key: ${KONG_PORTARIA_API_KEY:-condohome-portaria-key}

  - username: n8n-orchestrator
    custom_id: n8n-orchestrator-client
    keyauth_credentials:
      - key: ${KONG_N8N_API_KEY:-condohome-n8n-key}

  - username: mobile-app
    custom_id: mobile-app-client
    keyauth_credentials:
      - key: ${KONG_MOBILE_API_KEY:-condohome-mobile-key}
