# =====================================================
# CondoHome Platform - Kong Declarative Configuration
# Alternativa DB-less: use com KONG_DATABASE=off
# e KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
# =====================================================
_format_version: "3.0"
_transform: true

# =====================================================
# Services & Routes - Microserviços CondoHome
# =====================================================

services:
  # --- Register Service ---
  - name: register-service
    url: http://condohome-register:8081
    connect_timeout: 10000
    write_timeout: 30000
    read_timeout: 30000
    retries: 3
    routes:
      - name: register-route
        paths:
          - /api/register
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https

  # --- Billing Service ---
