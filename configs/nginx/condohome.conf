##
## CondoHome Platform - Nginx Reverse Proxy
## Configuração para deploy em VPS (Hostinger, DigitalOcean, etc.)
##

upstream gateway {
    server 127.0.0.1:8080;
}

upstream n8n {
    server 127.0.0.1:5678;
}

# API - api.condohome.com.br
server {
    listen 80;
    server_name api.condohome.com.br;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.condohome.com.br;

    ssl_certificate /etc/letsencrypt/live/api.condohome.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.condohome.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API Gateway
    location / {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Health check (sem autenticação)
    location /actuator/health {
        proxy_pass http://gateway;
        access_log off;
    }
}

# N8N - n8n.condohome.com.br
server {
    listen 80;
    server_name n8n.condohome.com.br;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name n8n.condohome.com.br;

    ssl_certificate /etc/letsencrypt/live/n8n.condohome.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.condohome.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
